<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" type="image/svg" href="images/uno.svg">
        <title>Quno</title>
    </head>

    <body>
        <div class="game-content">
            <header>
                <h1>Quno</h1>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
                    <span class="theme-toggle-icon" id="themeIcon">☀️</span>
                    <div class="theme-toggle-track">
                        <div class="theme-toggle-thumb"></div>
                    </div>
                    <span id="themeLabel">Light</span>
                </button>
            </header>
            <main>
                <div class="game-options">
                    <input type="button" id="btnOptions" class="game-btn" value="Options" onclick="showOptions()">
                    <input type="button" id="btnStart" class="game-btn" value="Start New Match" onclick="showResetConfirm()">
                    <input type="button" id="btnDeal" class="game-btn" value="Deal New Hand" onclick="newHand()">
                    <input type="button" id="btnJoin" class="game-btn" value="Join" onclick="joinGame()">
                </div>

                <div id="options">
                    <div id="options-container">
                        <div id="left-options">
                            <label><input type="checkbox" id="masterCheckbox" name="mattMode" value="mattMode">Matt Mode (maximum chaos)</label>
                            <hr>
                            <label><input type="checkbox" class="controlledCheckbox" name="playWildDraw4" value="playWildDraw4">Play Wild Draw 4 any time</label>
                            <label><input type="checkbox" class="controlledCheckbox" name="stackDraw2" value="stackDraw2">Stack Draw 2s</label>
                            <label><input type="checkbox" class="controlledCheckbox" name="skipDraw2" value="skipDraw2">Skip Draw 2s</label>
                            <label><input type="checkbox" class="controlledCheckbox" name="reverseDraw2" value="reverseDraw2">Reverse Draw 2s</label>
                            <label><input type="checkbox" class="controlledCheckbox" name="skipSkip" value="skipSkip">Skip a Skip</label>
                            <label><input type="checkbox" class="controlledCheckbox" name="stackDraw4" value="stackDraw4">Stack Draw 4s</label>
                            <label><input type="checkbox" class="controlledCheckbox" name="skipDraw4" value="skipDraw4">Skip Draw 4s</label>
                            <label><input type="checkbox" class="controlledCheckbox" name="reverseDraw4" value="reverseDraw4">Reverse Draw 4s</label>
                            <input type="button" id="btnSaveOptions" class="btn" value="Save" onclick="saveOptions()">
                        </div>
                        <div id="right-options">
                            <img src="./images/Stacking.jpg" alt="YoU cAn'T sTaCk DrAw 2s" id="options-image">
                        </div>
                    </div>
                </div>

                <div class="status" id="playerList"><strong>Players: </strong></div>

                <div class="status" id="status"></div>

                <div id="players" class="players">
                    <div id="player0" class="grid-item playerOpponent"></div>
                    <div id="player1" class="grid-item playerOpponent"></div>
                    <div id="player2" class="grid-item playerOpponent"></div>
                    <div id="player3" class="grid-item playerOpponent"></div>
                    <div class="grid-item playArea1">
                        <div class="pile"></div>
                    </div>
                    <div class="grid-item playArea2">
                        <div id="discard" class="card"></div>
                    </div>
                    <div id="player4" class="grid-item playerOpponent"></div>
                    <div id="player5" class="grid-item playerOpponent"></div>
                    <div id="player6" class="grid-item playerOpponent"></div>
                    <div id="direction-indicator" class="direction-indicator">
                        <div id="direction-arrow-wrap">
                            <img id="direction-arrow" src="images/rotate-ccw.svg" alt="play direction" draggable="false"/>
                            <span id="direction-count"></span>
                        </div>
                    </div>
                    <div id="playerSelf" class="grid-item playerSelf"></div>
                </div>

                <div id="color-buttons" class="color-buttons">
                    <input type="button" id="btnYellow" class="btn" value="Yellow" onclick="setColor('yellow')">
                    <input type="button" id="btnRed" class="btn" value="Red" onclick="setColor('red')">
                    <input type="button" id="btnBlue" class="btn" value="Blue" onclick="setColor('blue')">
                    <input type="button" id="btnGreen" class="btn" value="Green" onclick="setColor('green')">
                </div>

                <div id="uno-buttons" class="uno-buttons">
                    <input type="button" id="btnUnoMe" class="btn" value="Call Uno For Me" onclick="unoMe()">
                    <input type="button" id="btnUnoYou" class="btn" value="Call Uno On Another" onclick="unoYou()">
                </div>
                
                <div id="waitingOverlay" class="overlay">Waiting for the host to start the game</div>
            </main>
        </div>


        <div class="side-panel flex-vertical-container" id="side-panel">

            <div><button id="collapse-btn" class="collapse-button">&#9654;</button></div>

            <div class="config-container panel-container" id="config-container">

                <h3>Configuration:</h3>
                <label for="draw-sound">Draw sound:</label>

                <select name="Sound" id="draw-sound">
                    <option value="audio/gunshot-01.mp3">Gunshot 01</option>
                    <option value="audio/gunshot-02.wav">Gunshot 02</option>
                    <option value="audio/gunshot-03.wav">Gunshot 03</option>
                    <option value="audio/gunshot-04.wav">Gunshot 04</option>
                    <option value="audio/gunshot-05.mp3">Gunshot 05</option>
                    <option value="audio/draw-card.wav">Boring Sound</option>
                </select>
            </div>
            <hr></hr>
            <div class="panel-container">
            <h3>Messages:</h3>
            <div id="message-container">


            </div></div>

        </div>

        <div id="bootModal" class="modal">
            <div class="modal-content">
                <p id="bootMessage">Are you sure you want to boot this player?</p>
                <div class="modal-buttons">
                    <button id="confirmBoot" class="btn">Yes</button>
                    <button id="cancelBoot" class="btn">Cancel</button>
                </div>
            </div>
        </div>

        <div id="resetConfirmModal" class="modal">
            <div class="modal-content">
                <p><strong>Start a new match?</strong></p>
                <p class="modal-warning">This will reset all player scores and match statistics. Current hand progress will be lost.</p>
                <div class="modal-buttons">
                    <button id="confirmReset" class="btn">Start New Match</button>
                    <button id="cancelReset" class="btn" onclick="document.getElementById('resetConfirmModal').style.display='none'">Cancel</button>
                </div>
            </div>
        </div>

        <div id="handSummaryModal" class="overlay">
            <div class="modal-content">
                <div id="handSummaryContent"></div>
                <button class="btn" onclick="closeHandSummary()">Close</button>
            </div>
        </div>

        <script type="text/javascript" src="/socket.io/socket.io.js"></script>
        <script type="text/javascript" src="/main.js"></script>
        <script>
            // Toggle between light and dark mode and persist the choice
            function toggleTheme() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                const newTheme = isDark ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                document.getElementById('themeIcon').textContent = newTheme === 'dark' ? '🌙' : '☀️';
                document.getElementById('themeLabel').textContent = newTheme === 'dark' ? 'Dark' : 'Light';
                try { localStorage.setItem('quno-theme', newTheme); } catch(e) {}
            }

            // Apply saved theme preference before first paint to avoid a flash of light mode
            (function() {
                try {
                    const saved = localStorage.getItem('quno-theme');
                    if (saved === 'dark') {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        document.addEventListener('DOMContentLoaded', function() {
                            const icon = document.getElementById('themeIcon');
                            const label = document.getElementById('themeLabel');
                            if (icon) icon.textContent = '🌙';
                            if (label) label.textContent = 'Dark';
                        });
                    }
                } catch(e) {}
            })();
        </script>
    </body>
</html>
